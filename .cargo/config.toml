# Cargo registry mirror for users in China.
# Sparse protocol (cargo 1.68+) is significantly faster than the git index.
# Swap the active `replace-with` line if one mirror is slow.

[source.crates-io]
replace-with = "tuna"
# replace-with = "ustc"
# replace-with = "rsproxy"

[source.tuna]
registry = "sparse+https://mirrors.tuna.tsinghua.edu.cn/crates.io-index/"

[source.ustc]
registry = "sparse+https://mirrors.ustc.edu.cn/crates.io-index/"

[source.rsproxy]
registry = "sparse+https://rsproxy.cn/crates.io-index/"

[net]
git-fetch-with-cli = true
