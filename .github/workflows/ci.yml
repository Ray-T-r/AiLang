name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run if the same branch gets a new push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # E2E tests invoke clang at runtime and link Boehm GC; install both.
      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libgc-dev pkg-config

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install bdw-gc pkg-config

      - name: cargo build
        run: cargo build --release --workspace

      - name: cargo test
        run: cargo test --release --workspace
