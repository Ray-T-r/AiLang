name: Release

# Builds per-platform `ailangc` binaries and uploads them to the GitHub
# Release matching the pushed tag (e.g. `v0.1.0`). Tag your release on
# main; this workflow handles the rest. Re-runnable: assets are
# overwritten on re-upload.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # softprops/action-gh-release uploads need this

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest        # arm64 Apple Silicon runners
            target: aarch64-apple-darwin
            asset: ailangc-macos-aarch64.tar.gz
          - os: macos-13            # Intel runners
            target: x86_64-apple-darwin
            asset: ailangc-macos-x86_64.tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: ailangc-linux-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: ailangc-windows-x86_64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build ailangc
        run: cargo build --release --target ${{ matrix.target }} -p ailangc

      - name: Stage asset
        # Archive the binary so browser-downloaders get a recognizable
        # tar.gz / zip (Finder/Explorer won't try to open it as text).
        # Archive contains a single top-level `ailangc` (or `ailangc.exe`)
        # — install.sh / install.ps1 extract from that flat layout.
        shell: bash
        run: |
          mkdir -p stage
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/ailangc.exe" stage/ailangc.exe
            7z a "${{ matrix.asset }}" ./stage/ailangc.exe
          else
            cp "target/${{ matrix.target }}/release/ailangc" stage/ailangc
            chmod +x stage/ailangc
            tar -czf "${{ matrix.asset }}" -C stage ailangc
          fi
          ls -lh "${{ matrix.asset }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true

  # Installer scripts and the Claude skill don't actually depend on the
  # binaries — they're just files. `needs: build` + `if: always()` keeps
  # the "scripts upload after binaries" ordering when everything works,
  # but lets this job still run if one platform's build is slow or fails
  # (otherwise a stuck Intel-Mac runner blocks the install URL forever).
  upload-scripts:
    name: install scripts + skill
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            install.ps1
            skill/SKILL.md
          fail_on_unmatched_files: true
